<div class="col">
  <div class="card" style="width: 18rem;">
    <div class="card-header text-white bg-primary">{{ .name | markdownify }} </div>
    <h6 class="card-title">
      {{ .title | markdownify }}
    </h5>
    <div class="card-body">
      <p class="card-text">{{ .description | markdownify }}</p>
    </div>
  </div>
</div>
